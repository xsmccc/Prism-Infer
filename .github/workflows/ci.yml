name: CPU presubmit

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  cpu-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install CPU dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install --index-url https://download.pytorch.org/whl/cpu "torch>=2.5,<2.7"
          python -m pip install -e ".[dev]"
      - name: Static checks
        run: |
          python -m compileall -q prism_infer tests benchmarks scripts tools
          ruff format --check prism_infer tests benchmarks scripts
          ruff check prism_infer tests benchmarks scripts
          ruff check --select C901,PLR0911,PLR0912,PLR0915 prism_infer
          ruff check --select S101,PLR2004 prism_infer
      - name: CPU tests
        env:
          HF_HUB_OFFLINE: "1"
          TRANSFORMERS_OFFLINE: "1"
        run: >-
          python -m pytest -q
          -m "not model and not gpu and not slow and not distributed"
